version: '3.8'

services:
  postgres-shard-0:
    image: postgres:18-alpine
    container_name: postgres-shard-0
    environment:
      POSTGRES_DB: temp_db
      POSTGRES_USER: temp_user
      POSTGRES_PASSWORD: temp_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_shard_0_data:/var/lib/postgresql/data
    networks:
      - shard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temp_user -d temp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-shard-1:
    image: postgres:18-alpine
    container_name: postgres-shard-1
    environment:
      POSTGRES_DB: temp_db
      POSTGRES_USER: temp_user
      POSTGRES_PASSWORD: temp_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_shard_1_data:/var/lib/postgresql/data
    networks:
      - shard-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temp_user -d temp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_shard_0_data:
  postgres_shard_1_data:

networks:
  shard-network:
    driver: bridge
